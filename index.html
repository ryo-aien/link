<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bright Dynamic Portfolio</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%230f172a'/><path fill='%23f8fafc' d='M32 14c-9.4 0-17 7.6-17 17 0 7.5 4.9 13.9 11.7 16.1.9.2 1.3-.4 1.3-.9v-3.1c-4.8 1-5.8-2.1-5.8-2.1-.8-2-1.9-2.5-1.9-2.5-1.6-1.1.1-1.1.1-1.1 1.7.1 2.6 1.8 2.6 1.8 1.6 2.7 4.2 1.9 5.2 1.4.2-1.1.6-1.9 1.1-2.3-3.8-.4-7.8-1.9-7.8-8.4 0-1.9.7-3.5 1.8-4.7-.2-.4-.8-2.1.2-4.4 0 0 1.5-.5 4.9 1.8 1.4-.4 2.9-.6 4.4-.6s3 .2 4.4.6c3.4-2.3 4.9-1.8 4.9-1.8 1 2.3.4 4 .2 4.4 1.1 1.2 1.8 2.8 1.8 4.7 0 6.5-4 8-7.8 8.4.6.5 1.2 1.6 1.2 3.2v4.8c0 .5.4 1.1 1.3.9C44.1 44.9 49 38.5 49 31c0-9.4-7.6-17-17-17z'/></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-start: #1e293b;
            --bg-end: #0f172a;
            --accent: #38bdf8;
            --text-main: #f8fafc;
            --text-sub: #cbd5e1;
            --card-w: 280px;
            --card-h: 200px;
            --duration: 900ms;
            --ease: cubic-bezier(.25,.8,.25,1);
            --radius: 380px;
        }

        * { box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADIAAAAyCAMAAAAp4XiDAAAAUVBMVEWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYW/mhfTAAAAAXRSTlMzNghTqgAAADxJREFUeNpjYBgFo2AUjAIwQkICFGMDBgYGBgYgAAHIAiI+GAxAgJqEgFwJkZqAB4T9kAAJpEIAH0YBBgC+fQMk9eXWIAAAAABJRU5ErkJggg==');
            opacity: 0.04;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        .profile {
            text-align: center;
            margin-bottom: 60px;
            z-index: 2;
            animation: fadeInUp 1.2s ease-out forwards;
        }

        .profile h1 {
            margin: 0 0 8px 0;
            font-size: 2.5rem;
            font-weight: 800;
        }

        .profile p {
            margin: 0;
            color: var(--text-sub);
            font-size: 1.1rem;
        }

        .carousel-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            z-index: 2;
            animation: fadeInUp 1.2s ease-out 0.3s forwards;
            opacity: 0;
            padding-top: 80px;
        }

        .stage {
            width: var(--card-w);
            height: var(--card-h);
            position: relative;
            perspective: 1200px;
            filter: drop-shadow(0 30px 55px rgba(0,0,0,.55));
            user-select: none;
            margin-bottom: 60px;
        }

        .carousel {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform var(--duration) var(--ease);
            will-change: transform;
        }

        .card {
            position: absolute;
            inset: 0;
            border-radius: 20px;
            background: rgba(255,255,255,.06);
            border: 1px solid rgba(255,255,255,.15);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            transform-style: preserve-3d;
            display: flex;
            align-items: center;
            padding: 24px;
            overflow: hidden;
            text-decoration: none;
            color: var(--text-main);
            cursor: pointer;
            transition: border-color 0.3s ease, background 0.3s ease;
        }

        .card::before {
            content: "";
            position: absolute;
            inset: -60% -60% auto -60%;
            height: 70%;
            background: radial-gradient(circle at 30% 30%, rgba(56, 189, 248, .25), transparent 60%);
            transform: rotate(12deg);
            pointer-events: none;
        }

        .card:hover {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.1);
        }

        .card[data-state="side"] {
            opacity: .55;
            filter: blur(.2px) brightness(.85);
        }

        .card[data-state="back"] {
            opacity: .25;
            filter: blur(.4px) brightness(.7);
        }

        .card-icon {
            font-size: 2.5rem;
            margin-right: 20px;
            color: var(--accent);
            filter: drop-shadow(0 0 8px rgba(56, 189, 248, 0.4));
            flex-shrink: 0;
        }

        .card-content {
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .card-title {
            font-weight: 800;
            font-size: 1.1rem;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-desc {
            font-size: 0.85rem;
            color: var(--text-sub);
        }

        .controls {
            display: flex;
            gap: 12px;
            padding: 12px 16px;
            background: rgba(56, 189, 248, .10);
            border: 1px solid rgba(56, 189, 248, .25);
            border-radius: 999px;
            backdrop-filter: blur(10px);
        }

        .controls button {
            appearance: none;
            border: none;
            padding: 10px 18px;
            border-radius: 999px;
            color: var(--text-main);
            background: rgba(56, 189, 248, .20);
            cursor: pointer;
            font-weight: 700;
            font-size: 0.95rem;
            transition: background 0.2s ease, transform 0.1s ease;
        }

        .controls button:hover {
            background: rgba(56, 189, 248, .35);
        }

        .controls button:active {
            transform: translateY(1px);
        }

        .card-indicator {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .indicator-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transition: background 0.3s ease, transform 0.3s ease;
        }

        .indicator-dot.active {
            background: var(--accent);
            transform: scale(1.3);
        }

        @media (max-width: 480px) {
            :root {
                --card-w: 260px;
                --card-h: 180px;
                --radius: 320px;
            }
            .card { padding: 20px; }
            .card-icon { font-size: 2rem; margin-right: 16px; }
            .card-title { font-size: 1rem; }
        }

        .mail-link {
            position: fixed;
            bottom: calc(24px + 4rem);
            left: 50%;
            transform: translateX(-50%);
            color: #ffffff;
            font-size: 1.6rem;
            text-decoration: none;
            opacity: 0.7;
            transition: opacity 0.2s ease, transform 0.2s ease;
            z-index: 100;
        }

        .mail-link:hover {
            opacity: 1;
            transform: translateX(-50%) scale(1.15);
        }
    </style>
</head>
<body>

    <div class="profile">
        <h1>Yoshimura</h1>
        <p>Software Engineer</p>
    </div>

    <div class="carousel-section">
        <div class="stage">
            <div class="carousel" id="carousel"></div>
        </div>

        <div class="controls">
            <button id="prev"><i class="fas fa-chevron-left"></i> Prev</button>
            <button id="next">Next <i class="fas fa-chevron-right"></i></button>
        </div>

        <div class="card-indicator" id="indicator"></div>
    </div>

    <a class="mail-link" href="mailto:ryo.aiengineer@gmail.com" title="ryo.aiengineer@gmail.com">
        <i class="fas fa-envelope"></i>
    </a>

    <script>
        const linkData = [
            { title: "Vector Search Support AI", desc: "AI assistant", icon: "fab fa-github", url: "https://github.com/ryo-aien/vector-search-chatbot" },
            { title: "Gemini Retrieval Platform", desc: "検索・取得用アプリ", icon: "fas fa-laptop-code", url: "https://gemini-retrieval-platform-136795632311.asia-northeast1.run.app/" },
            { title: "Gemini File Search", desc: "ファイル検索", icon: "fas fa-book-open", url: "https://gemini-file-search-136795632311.asia-northeast1.run.app/" },
            { title: "Claude CLI Sandbox", desc: "CLIサンドボックス", icon: "fab fa-github", url: "https://github.com/ryo-aien/claude-cli-sandbox" },
            { title: "Codex Sandbox", desc: "Codexサンドボックス", icon: "fab fa-github", url: "https://github.com/ryo-aien/codex-sandbox" },
            { title: "Recruiting Assistant", desc: "AI採用スクリーニング支援", icon: "fab fa-github", url: "https://github.com/ryo-aien/recruiting-screening-assistant" }
        ];

        const carousel = document.getElementById("carousel");
        const indicator = document.getElementById("indicator");
        const n = linkData.length;

        const radius = parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--radius")) || 380;
        const step = 360 / n;

        // カードを生成
        linkData.forEach((data, i) => {
            const card = document.createElement('a');
            card.href = data.url;
            card.className = 'card';
            card.target = '_blank';
            card.dataset.i = i;
            card.innerHTML = `
                <i class="${data.icon} card-icon"></i>
                <div class="card-content">
                    <span class="card-title">${data.title}</span>
                    <span class="card-desc">${data.desc}</span>
                </div>
            `;
            card.style.transform = `rotateY(${i * step}deg) translateZ(${radius}px)`;
            carousel.appendChild(card);

            // インジケーター
            const dot = document.createElement('div');
            dot.className = 'indicator-dot';
            dot.dataset.i = i;
            dot.addEventListener('click', () => goTo(i));
            indicator.appendChild(dot);
        });

        const cards = Array.from(carousel.querySelectorAll(".card"));
        const dots = Array.from(indicator.querySelectorAll(".indicator-dot"));

        let active = 0;
        let angle = 0;

        function norm(i) { return (i % n + n) % n; }

        function renderStates() {
            cards.forEach((card, i) => {
                const d = Math.min(norm(i - active), norm(active - i));
                card.dataset.state = d === 0 ? "front" : (d === 1 ? "side" : "back");
            });
            dots.forEach((dot, i) => {
                dot.classList.toggle('active', i === active);
            });
        }

        function apply() {
            carousel.style.transform = `rotateY(${angle}deg)`;
            renderStates();
        }

        function next() {
            active = norm(active + 1);
            angle -= step;
            apply();
        }

        function prev() {
            active = norm(active - 1);
            angle += step;
            apply();
        }

        function goTo(target) {
            const diff = norm(target - active);
            const diffReverse = norm(active - target);

            if (diff <= diffReverse) {
                angle -= diff * step;
            } else {
                angle += diffReverse * step;
            }
            active = target;
            apply();
        }

        document.getElementById("next").addEventListener("click", next);
        document.getElementById("prev").addEventListener("click", prev);

        // キーボードナビゲーション
        document.addEventListener("keydown", (e) => {
            if (e.key === "ArrowLeft") prev();
            if (e.key === "ArrowRight") next();
        });

        // タッチスワイプ対応
        let touchStartX = 0;
        const stage = document.querySelector('.stage');

        stage.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
        }, { passive: true });

        stage.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const diff = touchStartX - touchEndX;
            if (Math.abs(diff) > 50) {
                if (diff > 0) next();
                else prev();
            }
        }, { passive: true });

        // 初期表示
        apply();
    </script>
</body>
</html>
